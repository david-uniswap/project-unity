version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: unity
      POSTGRES_PASSWORD: unity
      POSTGRES_DB: unity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./db/migrations/002_challenges.sql:/docker-entrypoint-initdb.d/002_challenges.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unity -d unity"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Snapshot indexer (runs pipeline every EPOCH_DURATION_MS)
  # ---------------------------------------------------------------------------
  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://unity:unity@postgres:5432/unity
    volumes:
      - indexer_artifacts:/app/artifacts

  # ---------------------------------------------------------------------------
  # REST API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://unity:unity@postgres:5432/unity
      PORT: 3001
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  indexer_artifacts:
